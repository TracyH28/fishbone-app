# fly.toml app configuration file generated for fishbone-backend on 2026-05-17T22:34:30-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fishbone-backend'
primary_region = 'ewr'

[build]

[deploy]
  release_command = "node src/db/migrate.js"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
